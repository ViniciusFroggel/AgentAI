name: CI/CD - AgentAI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # --- ETAPA 1: CI (Continuous Integration) ---
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm install

      - name: Gerar Cliente Prisma
        run: npx prisma generate

      - name: Validar Build do Next.js
        run: npm run build
        env:
          # Variáveis necessárias apenas para o build
          GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}
          DATABASE_URL: "file:./dev.db"

  # --- ETAPA 2: CD (Continuous Deployment) ---
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test # O Deploy só inicia se o CI passar
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy para Produção na Vercel
        run: vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}